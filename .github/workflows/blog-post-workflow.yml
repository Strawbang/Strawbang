name: Latest blog post workflow
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 
permissions:
  contents: write 

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Pull in medium
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@strawbang"
          comment_tag_name: "BLOG-POST-LIST"
      - name: Pull in Ippon blog
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://blog.ippon.fr/author/djamel-bougouffa/feed/"
          comment_tag_name: "IPPON-POST-LIST"